  <!-- Ribbon Text -->
  <text x="200" y="352" font-family="Arial, sans-serif" font-weight="900" font-size="22" text-anchor="middle" fill="#FFFFFF" letter-spacing="1">DESA PANYINDANGAN</text>
  <text x="200" y="375" font-family="Arial, sans-serif" font-weight="700" font-size="11" text-anchor="middle" fill="#FEF08A" letter-spacing="2">KAYADIPADIHARA HARJA</text>
