  <path d="M 130 170 Q 165 150 200 170 T 270 170" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
  <path d="M 130 190 Q 165 170 200 190 T 270 190" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
  <path d="M 130 210 Q 165 190 200 210 T 270 210" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
  
  <!-- Center Plate -->
  <circle cx="200" cy="250" r="50" fill="#FFFFFF" />
  
  <!-- House -->
  <polygon points="200,215 235,240 165,240" fill="#EF4444" />
  <rect x="175" y="240" width="50" height="35" fill="#1E293B" />
