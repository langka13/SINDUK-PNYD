  <rect x="180" y="250" width="10" height="25" fill="#FFFFFF" />
  <rect x="210" y="250" width="10" height="25" fill="#FFFFFF" />

  <!-- Rice and Cotton -->
  <path d="M 155 295 Q 140 250 175 210" fill="none" stroke="#F59E0B" stroke-width="6" stroke-dasharray="2,6" stroke-linecap="round" />
  <path d="M 245 295 Q 260 250 225 210" fill="none" stroke="#10B981" stroke-width="6" stroke-dasharray="2,6" stroke-linecap="round" />
  
  <!-- Ribbon -->
